query Bristols($input: BristolsInput) {
    bristols(input: $input) {
        data {
            id
            date
            time
            value
        }
        total
    }
}

mutation CreateBristol($input: CreateBristolInput!) {
    createBristol(input: $input) {
        id
        date
        time
        value
    }
}

mutation DeleteBristol($input: DeleteBristolInput!) {
    deleteBristol(input: $input)
}
