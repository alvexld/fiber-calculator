type Bristol {
    id: String!
    date: String!
    time: String!
    value: Int!
}

input CreateBristolInput {
    date: String!
    time: String!
    value: Int!
}

input DeleteBristolInput {
    id: String!
}

type PaginatedBristols {
    records: [Bristol!]!
    total: Int!
}

input BristolsInput {
    page: Int
    perPage: Int
}

extend type Query {
    bristols(input: BristolsInput): PaginatedBristols!
}

extend type Mutation {
    createBristol(input: CreateBristolInput!): Bristol!
    deleteBristol(input: DeleteBristolInput!): Boolean!
}
